# Forward-looking SpriteForge fixture for TinyTown.
# The current runtime does not consume this file yet.
# Keep semantic intent here aligned with the working *.sprite.toml sidecar above.

[atlas]
image = "tinytown_sprite_alpha.png"
width = 1440
height = 720

[grids.villagers_down]
origin_x = 0
origin_y = 0
columns = 3
rows = 4
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

[grids.villagers_left]
origin_x = 360
origin_y = 0
columns = 3
rows = 4
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

[grids.villagers_right]
origin_x = 720
origin_y = 0
columns = 3
rows = 4
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

[grids.villagers_up]
origin_x = 1080
origin_y = 0
columns = 3
rows = 4
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

[grids.props]
origin_x = 0
origin_y = 480
columns = 12
rows = 2
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

