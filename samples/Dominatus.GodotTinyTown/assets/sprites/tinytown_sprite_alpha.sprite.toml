# TinyTown runtime sprite sidecar.
# This is the file the current Godot sample consumes today through Dominatus.GodotConn.
# Keep this file in sync first; the adjacent *.spriteforge.toml is the forward-looking schema fixture.

[atlas]
image = "tinytown_sprite_alpha.png"
width = 1440
height = 720
columns = 12
rows = 6
cell_width = 120
cell_height = 120
default_pivot = "bottom_center"

# Villager rows:
# row 0 = Maya, row 1 = Theo, row 2 = Lina, row 3 = Nia
# Direction groups:
# cols 0-2 down, 3-5 left, 6-8 right, 9-11 up

[entities.maya]
kind = "villager"
display_name = "Maya"
row = 0
scale = 1.0
offset_x = 0
offset_y = 0

[entities.maya.animations.down]
frames = [0, 1, 2]
fps = 6
loop = true

[entities.maya.animations.left]
frames = [3, 4, 5]
fps = 6
loop = true

[entities.maya.animations.right]
frames = [6, 7, 8]
fps = 6
loop = true

[entities.maya.animations.up]
frames = [9, 10, 11]
fps = 6
loop = true

[entities.theo]
kind = "villager"
display_name = "Theo"
row = 1
scale = 1.0
offset_x = 0
offset_y = 0

