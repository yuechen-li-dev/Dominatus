# Runtime destinations:
# row 4 col 0 = well
# row 4 col 1 = market
# row 4 col 2 = garden
# row 4 col 3 = home
# row 4 col 4 = social / bench

[entities.well]
kind = "destination"
display_name = "Well"
row = 4
col = 0
scale = 0.92
offset_x = 0
offset_y = 4
pivot = "bottom_center"

[entities.market]
kind = "destination"
display_name = "Market"
row = 4
col = 1
scale = 0.94
offset_x = 0
offset_y = 6
pivot = "bottom_center"

[entities.garden]
kind = "destination"
display_name = "Garden"
row = 4
col = 2
scale = 0.90
offset_x = 0
offset_y = 5
pivot = "bottom_center"

[entities.home]
kind = "destination"
display_name = "Home"
row = 4
col = 3
scale = 0.96
offset_x = 0
offset_y = 4
pivot = "bottom_center"

[entities.social]
kind = "destination"
display_name = "Social"
row = 4
col = 4
scale = 0.90
offset_x = 0
offset_y = 2
pivot = "bottom_center"

# Conservative frame hints for the current runtime set.
# These are intentionally best-effort rather than pixel-perfect;
# follow-up tuning should continue here before touching code.

[frames."maya.down.0"]
row = 0
col = 0
offset_y = -2

[frames."theo.down.0"]
row = 1
col = 0
offset_y = -1

[frames."lina.down.0"]
row = 2
col = 0
offset_y = -2

[frames."nia.down.0"]
row = 3
col = 0
offset_y = -1
