name: dotnet test libraries

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-libraries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run dotnet test for all library projects
        run: |
          set -euo pipefail

          while IFS= read -r project; do
            echo "Testing ${project}"
            dotnet test "${project}" --configuration Release --verbosity minimal
          done < <(find src -name '*.csproj' ! -name '*Console*.csproj' | sort)
